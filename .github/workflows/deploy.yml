name: Build & Deploy

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
      env_suffix: ${{ steps.set-env.outputs.env_suffix }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "env_suffix=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "image_tag=dev" >> $GITHUB_OUTPUT
            echo "env_suffix=dev" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The docker-container driver pushes straight from BuildKit. The
      # default docker driver intermittently fails GHCR pushes of large
      # layers with "unknown blob".
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            API_URL=${{ secrets.API_URL }}
            MAINTENANCE_MODE=${{ secrets.MAINTENANCE_MODE }}
          secrets: |
            internal_api_key=${{ secrets.INTERNAL_API_KEY }}
          tags: |
            ${{ secrets.DOCKER_IMAGE }}:${{ needs.setup.outputs.image_tag }}
            ${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    environment: ${{ needs.setup.outputs.environment }}
    env:
      DEPLOY_DIR: ${{ secrets.PROJECT_DIR || secrets.DEPLOY_DIR }}/frontend/${{ needs.setup.outputs.env_suffix }}
      IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
      ENV_SUFFIX: ${{ needs.setup.outputs.env_suffix }}
      DOMAIN: ${{ secrets.DOMAIN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Fail fast: a failed login/pull must fail the job instead of
            # silently restarting the container from a stale local image.
            set -e

            mkdir -p ${{ env.DEPLOY_DIR }}
            cd ${{ env.DEPLOY_DIR }}

            cat > .env << ENVEOF
            API_URL=${{ secrets.API_URL }}
            INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
            GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }}
            AHREFS_ANALYTICS_KEY=${{ secrets.AHREFS_ANALYTICS_KEY }}
            INDEXNOW_KEY=${{ secrets.INDEXNOW_KEY }}
            DOMAIN=${{ env.DOMAIN }}
            MAINTENANCE_MODE=${{ secrets.MAINTENANCE_MODE }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            S3_PUBLIC_URL=${{ secrets.S3_PUBLIC_URL }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
            S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
            S3_REGION=${{ secrets.S3_REGION }}
            ENVEOF

            # GHCR_USER must be the account that owns GHCR_PAT.
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER || github.actor }} --password-stdin

            export DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }}
            export DOMAIN=${{ env.DOMAIN }}
            export ENV_SUFFIX=${{ env.ENV_SUFFIX }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}

            # compose pull guarantees we pull exactly the image compose
            # is about to run (single source of truth for the image name).
            docker compose -p klaps-frontend-${{ env.ENV_SUFFIX }} pull
            docker compose -p klaps-frontend-${{ env.ENV_SUFFIX }} up -d --force-recreate

            docker image prune -f || true
