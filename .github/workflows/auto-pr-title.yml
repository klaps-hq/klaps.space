name: Auto PR Title

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  pull-requests: write

jobs:
  rename-pr:
    name: Auto-format PR title
    runs-on: ubuntu-latest
    steps:
      - name: Update PR title
        uses: actions/github-script@v7
        with:
          script: |
            const TYPES = ["feat", "fix", "chore", "docs", "refactor", "test", "ci", "perf", "revert"];
            const conventionalRegex = /^(feat|fix|chore|docs|refactor|test|ci|perf|revert)(\([a-z0-9._/-]+\))?(!)?: .+/;
            const pr = context.payload.pull_request;
            const pull_number = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const baseRef = (pr.base?.ref || "").toLowerCase();
            const headRef = (pr.head?.ref || "").toLowerCase();
            const rawHeadRef = pr.head?.ref || "";
            const title = pr.title || "";

            // Dev -> main special case
            if (baseRef === "main" && headRef === "dev") {
              const desiredTitle = "chore: merge dev into main";
              if (title !== desiredTitle) {
                await github.rest.pulls.update({ owner, repo, pull_number, title: desiredTitle });
              }
              return;
            }

            // Already valid
            if (conventionalRegex.test(title)) {
              core.info(`PR title is already conventional: ${title}`);
              return;
            }

            // --- Extract type from branch name ---
            const typeRules = [
              { pattern: /^(feature|feat)[-/]/, type: "feat" },
              { pattern: /^(fix|bugfix|hotfix)[-/]/, type: "fix" },
              { pattern: /^(chore|maintenance|maintance)[-/]/, type: "chore" },
              { pattern: /^(docs|doc)[-/]/, type: "docs" },
              { pattern: /^(refactor|cleanup)[-/]/, type: "refactor" },
              { pattern: /^(test|tests)[-/]/, type: "test" },
              { pattern: /^(ci|build)[-/]/, type: "ci" },
              { pattern: /^(perf|performance)[-/]/, type: "perf" },
              { pattern: /^(revert)[-/]/, type: "revert" },
            ];

            let branchNorm = rawHeadRef.replace(/_/g, "-").toLowerCase();
            let typeFromBranch = "";

            for (const rule of typeRules) {
              if (rule.pattern.test(branchNorm)) {
                typeFromBranch = rule.type;
                branchNorm = branchNorm.replace(rule.pattern, "");
                break;
              }
            }

            // --- Extract ticket from branch or title (PROJ-123 pattern) ---
            const ticketRegex = /([a-z]+)[\s-]*(\d+)/i;

            let ticket = "";
            const branchTicket = branchNorm.match(ticketRegex);
            if (branchTicket) {
              ticket = `${branchTicket[1].toUpperCase()}-${branchTicket[2]}`;
              branchNorm = branchNorm.replace(branchTicket[0], "").replace(/^[-/]+/, "");
            }

            if (!ticket) {
              const titleTicket = title.match(ticketRegex);
              if (titleTicket) {
                ticket = `${titleTicket[1].toUpperCase()}-${titleTicket[2]}`;
              }
            }

            // --- Extract type from title if not found in branch ---
            let typeFromTitle = "";
            const titleLower = title.toLowerCase();
            for (const t of TYPES) {
              if (titleLower.startsWith(t + " ") || titleLower.startsWith(t + ":")) {
                typeFromTitle = t;
                break;
              }
            }

            // --- Build description ---
            // Prefer title text (user intent), fallback to branch name
            let description = "";

            // Clean title: remove ticket patterns, type prefixes, conventional prefix artifacts
            let cleanTitle = title
              .replace(/[a-z]+-?\s*\d+/gi, "")   // remove ticket refs
              .replace(/^(feat|fix|chore|docs|refactor|test|ci|perf|revert)\s*:?\s*/i, "")
              .replace(/[()]/g, "")
              .replace(/[\s-]+/g, " ")
              .trim();

            if (cleanTitle.length >= 3) {
              description = cleanTitle;
            } else {
              // Fallback to branch name
              description = branchNorm
                .replace(/[-/]+/g, " ")
                .replace(/\s+/g, " ")
                .trim();
            }

            if (!description) {
              description = "update changes";
            }

            description = description.charAt(0).toLowerCase() + description.slice(1);

            // --- Final type ---
            const type = typeFromBranch || typeFromTitle || "feat";

            // --- Compose title ---
            const ticketSuffix = ticket ? ` (${ticket})` : "";
            const desiredTitle = `${type}: ${description}${ticketSuffix}`;

            if (title === desiredTitle) {
              core.info(`PR title already up to date: ${desiredTitle}`);
              return;
            }

            core.info(`Updating PR title: "${title}" -> "${desiredTitle}"`);
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              title: desiredTitle,
            });
