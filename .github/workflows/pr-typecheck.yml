name: PR Typecheck
# Separate workflow keeps required checks modular and easy to manage.

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: pr-typecheck-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit
