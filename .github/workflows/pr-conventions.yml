name: PR Conventions

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-conventions-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR Title (Conventional)
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            revert

  commit-messages:
    name: Commit Messages (Conventional)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERN='^(feat|fix|chore|docs|refactor|test|ci|perf|revert)(\([a-z0-9._/-]+\))?!?: .+'
          INVALID=0
          while IFS= read -r subject; do
            if [[ "$subject" =~ ^Merge[[:space:]] ]]; then
              continue
            fi

            if [[ ! "$subject" =~ $PATTERN ]]; then
              echo "Invalid commit message: $subject"
              INVALID=1
            fi
          done < <(git log --no-merges --format=%s "$BASE_SHA..$HEAD_SHA")

          if [[ "$INVALID" -ne 0 ]]; then
            echo "Commit messages must follow Conventional Commits."
            exit 1
          fi
